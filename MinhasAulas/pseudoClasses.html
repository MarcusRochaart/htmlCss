<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Classes</title>
    <style>
    /*
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-element
        > = children
    
    
    */

        div{
            display: inline-block;
            background-color: antiquewhite;
            text-align: center;
            width: 200px;
            height: 200px;
            border-radius: 5px;
            border-style: solid;
        }
        /* as Pseudo classes são acessadas pelos : 
        representam estado de cada elemento dentro do html
        */
        div:hover{
            background-color: aquamarine;
        }
        div:active{
            color: blue;
            background-color: rgb(64, 64, 223);
        }
        /*Pseudo elementos são acessados pelos :: 
        acrescenta coisas antes ou depois dos elementos */
        div#d1::after{
            content: 'Acesso';
            color: brown;
        }

    </style>
</head>
<body>
    <!-- toda Div ocupa de ponta a ponta o espaco no site-->
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
